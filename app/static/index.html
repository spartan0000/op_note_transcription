<!DOCTYPE html>
<html>
<head>
    <title>Op Note Dictation</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        #recordBtn { background-color: #4CAF50; color: white; }
        #recordBtn.recording { background-color: #f44336; }
        #result { margin-top: 20px; padding: 15px; border: 1px solid #ddd; display: none; }
        #noteUrl { color: #0066cc; word-break: break-all; }
    </style>
</head>
<body>
    <h1>Op Note Dictation</h1>
    <button id="recordBtn">Start Recording</button>
    <div id="result">
        <p>Your note is ready:</p>
        <p><strong>Open in browser:</strong></p>
        <p id="noteUrl"></p>
        <button onclick="copyToClipboard()">Copy Link</button>
    </div>
    <div id="error" style="color: red; display: none;"></div>

    <script>
        let mediaRecorder;
        let stream;
        let chunks = [];
        const recordBtn = document.getElementById('recordBtn');
        const resultDiv = document.getElementById('result');
        const noteUrl = document.getElementById('noteUrl');
        const errorDiv = document.getElementById('error');

        recordBtn.addEventListener('click', async () => {
            if (!mediaRecorder) {
                // Start recording
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    
                    mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
                    mediaRecorder.onstop = sendAudio;
                    
                    mediaRecorder.start();
                    recordBtn.textContent = 'Stop Recording';
                    recordBtn.classList.add('recording');
                    resultDiv.style.display = 'none';
                    errorDiv.style.display = 'none';
                } catch (err) {
                    errorDiv.textContent = 'Microphone access denied: ' + err.message;
                    errorDiv.style.display = 'block';
                }
            } else {
                // Stop recording
                mediaRecorder.stop();
                recordBtn.textContent = 'Start Recording';
                recordBtn.classList.remove('recording');
                recordBtn.disabled = true;
                recordBtn.textContent = 'Processing...';
                
                // Stop all tracks
                stream.getTracks().forEach(track => track.stop());
            }
        });

        async function sendAudio() {
            const audioBlob = new Blob(chunks, { type: 'audio/wav' });
            const formData = new FormData();
            formData.append('file', audioBlob, 'recording.wav');

            try {
                const response = await fetch('/transcribe', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Upload failed');
                
                const data = await response.json();
                const fullUrl = window.location.origin + data.url;
                noteUrl.textContent = fullUrl;
                resultDiv.style.display = 'block';
                
                recordBtn.disabled = false;
                chunks = [];
                mediaRecorder = null;
            } catch (err) {
                errorDiv.textContent = 'Error: ' + err.message;
                errorDiv.style.display = 'block';
                recordBtn.disabled = false;
            }
        }

        function copyToClipboard() {
            const url = noteUrl.textContent;
            navigator.clipboard.writeText(url).then(() => {
                alert('Link copied!');
            });
        }
    </script>
</body>
</html>
