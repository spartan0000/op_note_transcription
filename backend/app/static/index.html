<!DOCTYPE html>
<html>
<head>
    <title>Op Note Dictation</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; text-align: center; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        #dictateBtn { background-color: #4CAF50; color: white; }
        #dictateBtn.recording { background-color: #f44336; }
        #dictateBtn:disabled { background-color: #aaa; cursor: default; }
        #submitBtn { background-color: #FF9800; color: white; margin-top: 10px; }
        #submitBtn:disabled { background-color: #ffcc80; cursor: default; }
        #transcript { width: 100%; min-height: 120px; margin-top: 15px; padding: 10px;
            box-sizing: border-box; font-size: 15px; border: 1px solid #ccc;
            border-radius: 4px; text-align: left; resize: vertical; }
        #interimText { color: #999; font-style: italic; min-height: 22px; margin-top: 4px; text-align: left; }
        #status { color: #666; font-size: 14px; margin-top: 8px; min-height: 20px; }
        #result { margin-top: 20px; padding: 15px; border: 1px solid #ddd; display: none; text-align: left; }
        #noteUrl { color: #0066cc; word-break: break-all; }
        .divider { margin: 30px 0; display: flex; align-items: center; gap: 10px; }
        .divider hr { flex: 1; border: none; border-top: 1px solid #ccc; }
        .divider span { color: #888; font-size: 14px; white-space: nowrap; }
        #fileSection { display: flex; align-items: center; justify-content: center; gap: 10px; }
        #uploadBtn { background-color: #2196F3; color: white; }
        #uploadBtn:disabled { background-color: #90caf9; cursor: default; }
        #error { color: red; display: none; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Op Note Dictation</h1>

    <button id="dictateBtn">Start Dictating</button>
    <div id="status"></div>
    <textarea id="transcript" placeholder="Transcript will appear here as you speak..."></textarea>
    <div id="interimText"></div>
    <br>
    <button id="submitBtn" disabled>Submit Note</button>

    <div class="divider">
        <hr><span>or upload a file</span><hr>
    </div>

    <div id="fileSection">
        <input type="file" id="audioFile" accept="audio/*">
        <button id="uploadBtn">Upload & Transcribe</button>
    </div>

    <div id="result">
        <p>Your note is ready:</p>
        <p><strong>Open in browser:</strong></p>
        <p id="noteUrl"></p>
        <button onclick="copyToClipboard()">Copy Link</button>
    </div>
    <div id="error"></div>

    <script>
        const dictateBtn = document.getElementById('dictateBtn');
        const submitBtn = document.getElementById('submitBtn');
        const transcriptArea = document.getElementById('transcript');
        const interimText = document.getElementById('interimText');
        const resultDiv = document.getElementById('result');
        const noteUrl = document.getElementById('noteUrl');
        const errorDiv = document.getElementById('error');
        const statusDiv = document.getElementById('status');
        const audioFile = document.getElementById('audioFile');
        const uploadBtn = document.getElementById('uploadBtn');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            dictateBtn.disabled = true;
            dictateBtn.textContent = 'Not supported in this browser';
            showError('Chrome Speech Recognition is not available. Please use Chrome or Edge.');
        }

        let recognition;
        let isListening = false;
        let finalTranscript = '';

        function initRecognition() {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                statusDiv.textContent = 'Listening...';
                dictateBtn.textContent = 'Stop Dictating';
                dictateBtn.classList.add('recording');
                submitBtn.disabled = true;
            };

            recognition.onresult = (event) => {
                let interim = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const text = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += text + ' ';
                    } else {
                        interim += text;
                    }
                }
                transcriptArea.value = finalTranscript;
                interimText.textContent = interim;
            };

            recognition.onerror = (event) => {
                if (event.error !== 'no-speech') {
                    showError('Speech recognition error: ' + event.error);
                    stopListening();
                }
            };

            // Chrome stops recognition after silence; restart if still dictating
            recognition.onend = () => {
                if (isListening) recognition.start();
            };
        }

        function stopListening() {
            isListening = false;
            if (recognition) {
                recognition.onend = null;
                recognition.stop();
            }
            dictateBtn.textContent = 'Start Dictating';
            dictateBtn.classList.remove('recording');
            statusDiv.textContent = '';
            interimText.textContent = '';
            submitBtn.disabled = !transcriptArea.value.trim();
        }

        dictateBtn.addEventListener('click', () => {
            if (!SpeechRecognition) return;
            if (!isListening) {
                isListening = true;
                finalTranscript = transcriptArea.value;
                resultDiv.style.display = 'none';
                errorDiv.style.display = 'none';
                initRecognition();
                recognition.start();
            } else {
                stopListening();
            }
        });

        transcriptArea.addEventListener('input', () => {
            submitBtn.disabled = !transcriptArea.value.trim();
        });

        submitBtn.addEventListener('click', async () => {
            const text = transcriptArea.value.trim();
            if (!text) return;
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';
            resultDiv.style.display = 'none';
            errorDiv.style.display = 'none';

            try {
                const response = await fetch('http://localhost:8000/transcribe-text', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ transcript: text })
                });
                if (!response.ok) throw new Error('Submission failed');
                const data = await response.json();
                showResult(data.url);
            } catch (err) {
                showError('Error: ' + err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Note';
            }
        });

        uploadBtn.addEventListener('click', async () => {
            const file = audioFile.files[0];
            if (!file) { showError('Please select an audio file first.'); return; }
            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Processing...';
            resultDiv.style.display = 'none';
            errorDiv.style.display = 'none';

            const formData = new FormData();
            formData.append('file', file, file.name);

            try {
                const response = await fetch('http://localhost:8000/transcribe', { method: 'POST', body: formData });
                if (!response.ok) throw new Error('Upload failed');
                const data = await response.json();
                showResult(data.url);
            } catch (err) {
                showError('Error: ' + err.message);
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.textContent = 'Upload & Transcribe';
            }
        });

        function showResult(url) {
            noteUrl.textContent = 'http://localhost:8000' + url;
            resultDiv.style.display = 'block';
        }

        function showError(msg) {
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(noteUrl.textContent).then(() => alert('Link copied!'));
        }
    </script>
</body>
</html>
