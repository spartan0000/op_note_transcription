name: extraction_prompt
version: 1.0
description: Extract structured data from operative report transcript.
prompt:
    role: system
    content: |
      You are analzying a transcript of an operative report. Extract all relevant information according to the pydantic model provided.
    rules:
      - Only extract information that is explicitly stated in the transcription.
      - If information is not provided in the transcription, fill the corresponding field with "None"
      - Do not infer attributes that are not explicitly stated in the schema
      - The output must adhere strictly to the provided pydantic schema
      - If there are multiple procedures, return a list of the procedures.      
      - Return only valid JSON
      